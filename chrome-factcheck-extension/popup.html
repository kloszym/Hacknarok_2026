<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 350px;
      padding: 20px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      margin: 0;
    }
    .container {
      background: white;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    h1 {
      margin: 0 0 20px 0;
      font-size: 24px;
      color: #333;
      text-align: center;
    }
    .logo {
      text-align: center;
      font-size: 48px;
      margin-bottom: 10px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      color: #555;
      font-weight: 500;
    }
    input {
      width: 100%;
      padding: 10px;
      border: 2px solid #e0e0e0;
      border-radius: 5px;
      font-size: 14px;
      box-sizing: border-box;
      transition: border-color 0.3s;
      margin-bottom: 15px;
    }
    input:focus {
      outline: none;
      border-color: #667eea;
    }
    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
      transition: transform 0.2s;
    }
    button:hover {
      transform: translateY(-2px);
    }
    button:active {
      transform: translateY(0);
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    .analyze-btn {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      margin-top: 20px;
    }
    .message {
      margin-top: 15px;
      padding: 10px;
      border-radius: 5px;
      text-align: center;
      font-weight: 500;
      display: none;
    }
    .message.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    .message.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
    .message.info {
      background: #d1ecf1;
      color: #0c5460;
      border: 1px solid #bee5eb;
    }
    .info {
      margin-top: 15px;
      padding: 10px;
      background: #e7f3ff;
      border-left: 4px solid #2196F3;
      border-radius: 4px;
      font-size: 12px;
      color: #555;
    }
    .info a {
      color: #2196F3;
      text-decoration: none;
      font-weight: 600;
    }
    .info a:hover {
      text-decoration: underline;
    }
    .divider {
      height: 1px;
      background: #e0e0e0;
      margin: 20px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">🔍</div>
    <h1>FactCheck AI</h1>
    
    <label for="tavilyKey">Tavily API Key (Wyszukiwanie):</label>
    <input type="password" id="tavilyKey" placeholder="tvly-xxxxx">

    <label for="geminiKey">Gemini API Key (Analiza AI):</label>
    <input type="password" id="geminiKey" placeholder="AIza-xxxxx">

    <button id="saveBtn">Zapisz</button>
    <div id="message" class="message"></div>
    
    <div class="divider"></div>
    
    <button id="analyzeBtn" class="analyze-btn">🔎 Analyze Webpage</button>
    
    <div class="info">
      Pobierz klucz z <a href="https://tavily.com/" target="_blank">Tavily Dashboard</a>
      <br><br>
      <strong>Analyze Webpage:</strong> Skanuje bieżącą stronę w poszukiwaniu potencjalnych manipulacji i zaznacza je na czerwono.
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
