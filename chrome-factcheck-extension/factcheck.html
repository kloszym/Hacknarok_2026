<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 350px;
      min-height: 500px;
      padding: 0;
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .container {
      background: white;
      border-radius: 10px;
      margin: 20px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      overflow: hidden;
    }
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 15px;
      text-align: center;
    }
    .header h1 {
      font-size: 20px;
      margin: 0 0 5px 0;
    }
    .header .subtitle {
      font-size: 11px;
      opacity: 0.9;
    }
    .content {
      padding: 15px;
      max-height: 450px; /* Zwiększono nieco wysokość */
      overflow-y: auto;
    }
    .section {
      margin-bottom: 15px;
    }
    .section-title {
      font-size: 14px;
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
      padding-bottom: 5px;
      border-bottom: 2px solid #667eea;
    }
    .selected-text {
      background: #f8f9fa;
      padding: 10px;
      border-radius: 8px;
      border-left: 3px solid #667eea;
      font-style: italic;
      color: #555;
      line-height: 1.4;
      font-size: 12px;
      max-height: 80px;
      overflow-y: auto;
    }
    .loading {
      text-align: center;
      padding: 20px;
    }
    .spinner {
      border: 3px solid #f3f3f3;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
      margin: 0 auto 10px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .analysis {
      background: #f8f9fa;
      padding: 10px;
      border-radius: 8px;
      line-height: 1.5;
      color: #333;
      white-space: pre-wrap;
      word-wrap: break-word;
      font-size: 11px;
      max-height: 150px;
      overflow-y: auto;
    }
    .verdict {
      display: inline-block;
      padding: 5px 10px;
      border-radius: 12px;
      font-weight: 600;
      margin-bottom: 8px;
      font-size: 11px;
    }
    .verdict.true { background: #d4edda; color: #155724; }
    .verdict.false { background: #f8d7da; color: #721c24; }
    .verdict.partial { background: #fff3cd; color: #856404; }
    .verdict.context { background: #d1ecf1; color: #0c5460; }
    .verdict.unknown { background: #e2e3e5; color: #383d41; }

    .sources {
      list-style: none;
      padding: 0;
      /* Pozwalamy liście rosnąć */
    }
    .source-item {
      background: #f8f9fa;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 8px;
      border-left: 3px solid #667eea;
      font-size: 10px;
    }
    
    /* --- NOWE STYLE DLA NOTATEK AI --- */
    .source-note {
      margin-top: 8px;
      padding: 8px;
      background-color: #f1f3f9;
      border-left: 3px solid #764ba2;
      border-radius: 4px;
      font-size: 10px;
      color: #444;
      line-height: 1.4;
      font-style: italic;
    }
    .source-note-title {
      font-weight: bold;
      color: #764ba2;
      display: block;
      margin-bottom: 3px;
      font-style: normal;
      font-size: 9px;
      text-transform: uppercase;
    }
    /* -------------------------------- */

    .source-item a {
      color: #667eea;
      text-decoration: none;
      font-weight: 500;
      word-break: break-all;
      display: block;
      margin-top: 4px;
    }
    .source-item a:hover {
      text-decoration: underline;
    }
    .source-type {
      display: inline-block;
      background: #667eea;
      color: white;
      padding: 2px 5px;
      border-radius: 3px;
      font-size: 8px;
      margin-right: 5px;
      text-transform: uppercase;
    }
    .error {
      background: #f8d7da; color: #721c24;
      padding: 12px; border-radius: 8px;
      border-left: 3px solid #dc3545; font-size: 11px;
    }
    .model-info {
      text-align: center;
      padding: 8px;
      background: #e7f3ff;
      border-radius: 6px;
      font-size: 9px;
      color: #555;
      margin-top: 8px;
    }
    .model-info strong { color: #2196F3; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🔍 BadSource Checker</h1>
      <div class="subtitle">AI-Powered Fact Verification</div>
    </div>
    
    <div class="content">
      <div class="section">
        <div class="section-title">Selected Text</div>
        <div class="selected-text" id="selectedText"></div>
      </div>
      
      <div id="loadingSection" class="loading">
        <div class="spinner"></div>
        <div id="loadingText">Inicjalizacja...</div>
      </div>
      
      <div id="resultsSection" style="display: none;">
        <div class="section">
          <div class="section-title">Analysis</div>
          <div id="verdictContainer"></div>
          <div class="analysis" id="analysisText"></div>
        </div>
        
        <div class="section">
          <div class="section-title">Sources & References</div>
          <ul class="sources" id="sourcesList"></ul>
        </div>
        
        <div class="model-info">
          Powered by <strong id="modelName"></strong>
        </div>
      </div>
      
      <div id="errorSection" style="display: none;">
        <div class="error" id="errorText"></div>
      </div>
    </div>
  </div>
  <script src="factcheck.js"></script>
</body>
</html>
